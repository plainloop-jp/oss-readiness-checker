name: Bug report
description: Report something that is not working as expected.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem.

        Please do not include security vulnerabilities here. Follow the instructions in [SECURITY.md](https://github.com/plainloop-jp/oss-readiness-checker/blob/main/SECURITY.md) instead.

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      description: Describe the result you expected.
      placeholder: I expected the checker to...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      description: Include the full error message or unexpected output when possible.
      placeholder: Instead, the checker...
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command
      description: What command did you run?
      render: shell
      placeholder: npx oss-readiness-checker check .
    validations:
      required: true

  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS 15, Ubuntu 24.04, ...
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Run `node --version` to find this.
      placeholder: v24.16.0
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add anything else that may help explain the problem.
    validations:
      required: false
