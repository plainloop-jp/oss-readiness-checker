name: Feature request
description: Suggest an improvement for OSS Readiness Checker.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. A short explanation is enough.

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe what is difficult or missing today.
      placeholder: It is difficult to...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: What would you like to happen?
      description: Describe your idea in your own words.
      placeholder: The checker could...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried another approach? This is optional.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add examples, screenshots, or links if they are useful.
    validations:
      required: false

